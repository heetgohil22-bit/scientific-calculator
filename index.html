<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="calculator.css" />
</head>
<body>

  <div class="calculator">
    <div class="calc-label">Scientific Calc</div>

    <div class="display-area">
      <div class="display-expr" id="expr"></div>
      <div class="display-main" id="display">0</div>
    </div>

    <div class="mode-row">
      <button class="mode-btn active" id="degBtn" onclick="setMode('deg')">DEG</button>
      <button class="mode-btn" id="radBtn" onclick="setMode('rad')">RAD</button>
      <button class="mode-btn" id="gradBtn" onclick="setMode('grad')">GRAD</button>
    </div>

    <div class="btn-grid" id="btnGrid"></div>
  </div>

  <script src="calculator.js"></script>
</body>
</html>
